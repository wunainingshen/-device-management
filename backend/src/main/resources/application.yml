    secret: DeviceManagementSecretKey2024VeryLongAndSecureKey
    expiration: 86400000
  deepseek:
    api-key: sk-92fd34c1044541d18e481b0c171df138
    api-url: https://api.deepseek.com/v1/chat/completions

logging:
  level:
    com.devicemanagement: DEBUG
    org.springframework.security: DEBUG
